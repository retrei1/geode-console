name: Build Android .so

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Geode SDK
        run: |
          git clone https://github.com/geode-sdk/geode-sdk.git /opt/geode-sdk
          echo "GEODE_SDK=/opt/geode-sdk" >> $GITHUB_ENV

      - name: Build
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DGEODE_TARGET=Android64 -DGEODE_SDK=${{ env.GEODE_SDK }}
          make -j$(nproc)

      - name: Upload .so
        uses: actions/upload-artifact@v4
        with:
          name: geode-mod-android
          path: build/*.so
