name: Build Android .so

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Geode SDK
        run: |
          git clone --depth 1 https://github.com/geode-sdk/geode-sdk.git /opt/geode-sdk
          echo "GEODE_SDK=/opt/geode-sdk" >> $GITHUB_ENV

      - name: Configure
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DGEODE_TARGET=Android64

      - name: Build
        run: |
          cd build
          make -j$(nproc)

      - name: Upload .so
        uses: actions/upload-artifact@v4
        with:
          name: console-mod-android
          path: build/*.so
