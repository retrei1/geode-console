name: Build Android .so

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Geode
        uses: geode-sdk/setup-geode-mod@main
        with:
          sdk: 5.7.1
          target: Android64

      - name: Build
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DGEODE_TARGET=Android64
          make -j$(nproc)

      - name: Upload .so
        uses: actions/upload-artifact@v4
        with:
          name: geode-mod-android
          path: build/*.so
