name: Build Geode Mod

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Geode
        uses: geode-sdk/setup-geode-mod@main
        with:
          sdk: 5.7.1
          target: Android64

      - name: Configure
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DGEODE_TARGET=Android64

      - name: Build
        run: |
          cd build
          make -j$(nproc)

      - name: Upload .so
        uses: actions/upload-artifact@v4
        with:
          name: console-mod-android
          path: build/*.so

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Geode
        uses: geode-sdk/setup-geode-mod@main
        with:
          sdk: 5.7.1
          target: Win32

      - name: Configure
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DGEODE_TARGET=Win32

      - name: Build
        run: |
          cd build
          cmake --build . --config Release

      - name: Upload .dll
        uses: actions/upload-artifact@v4
        with:
          name: console-mod-windows
          path: build/Release/*.dll
